<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Afiliados</title>
  <meta name="description" content="Acesse a área administrativa do catálogo de afiliados." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-light">
  <main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h1 class="h4 mb-1">Área administrativa</h1>
                <p class="text-secondary mb-0">Entre com seu usuário do Supabase Auth</p>
              </div>

              <div id="statusMessage" class="alert d-none" role="alert"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" required autocomplete="email" />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Senha</label>
                  <input type="password" id="password" class="form-control" required autocomplete="current-password" />
                </div>
                <button id="loginBtn" type="submit" class="btn btn-primary w-100">Entrar</button>
              </form>

              <div class="text-center mt-4 d-grid gap-2">
                <a href="cadastro.html" class="btn btn-outline-primary">Criar nova conta</a>
                <a href="index.html" class="link-secondary">Voltar para a página inicial</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
