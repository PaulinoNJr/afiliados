<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuários | Afiliados ML</title>
  <meta name="description" content="Gestão de usuários e perfis de acesso." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Afiliados ML</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span id="userRoleBadge" class="badge text-bg-secondary">perfil</span>
        <small id="userEmail" class="text-secondary d-none d-md-inline"></small>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm" type="button">Sair</button>
      </div>
    </div>
  </nav>

  <main class="py-4 py-lg-5">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
          <h1 class="h3 mb-1">Gestão de usuários</h1>
          <p class="text-secondary mb-0">Defina perfil de acesso e cadastre novos usuários.</p>
        </div>
        <a href="admin.html" class="btn btn-outline-primary">Voltar ao painel</a>
      </div>

      <div id="statusMessage" class="alert d-none" role="alert"></div>

      <div class="row g-4">
        <div class="col-12 col-xl-4">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h2 class="h5 mb-3">Cadastrar novo usuário</h2>
              <form id="createUserForm" novalidate>
                <div class="mb-3">
                  <label for="newUserEmail" class="form-label">Email</label>
                  <input id="newUserEmail" type="email" class="form-control" required autocomplete="email" />
                </div>
                <div class="mb-3">
                  <label for="newUserPassword" class="form-label">Senha</label>
                  <input id="newUserPassword" type="password" class="form-control" minlength="6" required autocomplete="new-password" />
                </div>
                <div class="mb-3">
                  <label for="newUserPasswordConfirm" class="form-label">Confirmar senha</label>
                  <input id="newUserPasswordConfirm" type="password" class="form-control" minlength="6" required autocomplete="new-password" />
                </div>
                <button id="createUserBtn" type="submit" class="btn btn-primary w-100">Criar usuário</button>
              </form>
              <small class="text-muted d-block mt-2">
                Novos usuários entram como perfil <strong>produtor</strong>.
              </small>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <h2 class="h5 mb-0">Usuários e perfis</h2>
                <button id="reloadUsersBtn" class="btn btn-outline-primary btn-sm" type="button">Atualizar lista</button>
              </div>

              <div id="usersLoading" class="text-center py-4 d-none">
                <div class="spinner-border spinner-border-sm text-primary" role="status" aria-hidden="true"></div>
                <span class="ms-2 text-secondary">Carregando...</span>
              </div>

              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Email</th>
                      <th>Perfil</th>
                      <th>Criado em</th>
                      <th class="text-end">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="usersTableBody"></tbody>
                </table>
              </div>

              <div id="emptyUsersState" class="text-center py-4 text-secondary d-none">
                Nenhum usuário encontrado.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/users.js"></script>
</body>
</html>
